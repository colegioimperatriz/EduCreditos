<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>EduCreditos ERP v1.7</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{font-family:Arial;margin:0;background:#eef2f7}

header{background:#111827;color:white;padding:15px;font-size:20px}

.login{height:100vh;display:flex;align-items:center;justify-content:center}

.box{background:white;padding:35px;border-radius:8px;width:320px;box-shadow:0 5px 15px rgba(0,0,0,0.15)}

.container{display:flex}

.menu{width:220px;background:#1f2937;min-height:100vh;padding:15px}

.menu button{width:100%;padding:10px;margin-bottom:8px;border:none;background:#374151;color:white}

.menu button:hover{background:#2563eb}

.main{flex:1;padding:20px}

.card{background:white;padding:20px;margin-bottom:20px;border-radius:8px}

table{width:100%;border-collapse:collapse}

th,td{border:1px solid #ddd;padding:8px}

th{background:#f2f2f2}

input,select{padding:8px;margin:5px}

.quick button{margin:5px}

</style>
</head>

<body>

<div id="loginScreen" class="login">
<div class="box">

<h2>Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginSenha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div id="loginErro" style="color:red"></div>

</div>
</div>

<div id="app" style="display:none">

<header>
EduCreditos ERP
<button onclick="logout()" style="float:right">Sair</button>
</header>

<div class="container">

<div class="menu">
<button onclick="abrir('dashboard')">Dashboard</button>
<button onclick="abrir('alunos')">Alunos</button>
<button onclick="abrir('mov')">Movimentações</button>
<button onclick="abrir('extrato')">Extrato</button>
</div>

<div class="main">

<div id="dashboard" class="card">

<h2>Dashboard</h2>

<div id="totalHoje"></div>

<h3>Saldo por aluno</h3>
<table id="saldoTabela"></table>

</div>

<div id="alunos" class="card" style="display:none">

<h2>Cadastro de aluno</h2>

<input id="nomeAluno" placeholder="Nome">
<input id="raAluno" placeholder="RA">
<input id="cpfAluno" placeholder="CPF">
<input id="emailAluno" placeholder="Email">
<input id="telefoneAluno" placeholder="Telefone">

<button onclick="salvarAluno()">Salvar</button>

<input id="buscaAluno" placeholder="Buscar aluno" onkeyup="filtrarAlunos()">

<table id="tabelaAlunos"></table>

</div>

<div id="mov" class="card" style="display:none">

<h2>Movimentação</h2>

<select id="movAluno" onchange="mostrarSaldoAluno()"></select>

<div id="saldoAluno"></div>

<select id="tipoMov" onchange="ajustarMetodo()">
<option value="CREDITO">Crédito</option>
<option value="DEBITO">Débito</option>
</select>

<!--<input id="valorMov" placeholder="Valor"> -->
<input id="valorMov" type="number" step="0.01" min="0" placeholder="Valor">

<select id="metodoMov">
<option value="1">PIX</option>
<option value="2">Cartão Débito</option>
<option value="3">Cartão Crédito</option>
<option value="4">Dinheiro</option>
</select>

<input id="descMov" placeholder="Descrição">

<button onclick="movimentar()">Registrar</button>

<div class="quick">

<button onclick="creditoRapido(10)">+10</button>
<button onclick="creditoRapido(20)">+20</button>

<button onclick="debitoRapido(10)">-10</button>
<button onclick="debitoRapido(20)">-20</button>

</div>

</div>

<div id="extrato" class="card" style="display:none">

<h2>Extrato</h2>

<select id="extratoAluno"></select>

<button onclick="buscarExtrato()">Buscar</button>
<button onclick="exportarExcel()">Exportar</button>

<table id="tabelaExtrato"></table>

</div>

</div>
</div>
</div>

<script>

const SUPABASE_URL="https://zgugjxhjcpbrilvynwhe.supabase.co"
const SUPABASE_KEY="sb_publishable_nR7uzqGus2LJYe4A48_n7g_dqjV8To3"

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let alunosCache=[]
let extratoCache=[]
let alunoEditando=null

async function login(){

const {error}=await supabaseClient.auth.signInWithPassword({
email:loginEmail.value,
password:loginSenha.value
})

if(error){loginErro.innerText=error.message;return}

iniciarSistema()

}

async function logout(){await supabaseClient.auth.signOut();location.reload()}

async function iniciarSistema(){

loginScreen.style.display="none"
app.style.display="block"

carregarAlunos()
carregarSaldo()
totalHoje()

}

supabaseClient.auth.getSession().then(({data})=>{
if(data.session) iniciarSistema()
})

function abrir(id){

document.querySelectorAll(".card").forEach(c=>c.style.display="none")
document.getElementById(id).style.display="block"

}

async function salvarAluno(){

const aluno={
nome:nomeAluno.value,
ra:raAluno.value,
cpf:cpfAluno.value,
email:emailAluno.value,
telefone:telefoneAluno.value
}

if(alunoEditando){

await supabaseClient
.from("alunos")
.update(aluno)
.eq("id",alunoEditando)

alunoEditando=null

}else{

await supabaseClient
.from("alunos")
.insert([aluno])

}

nomeAluno.value=""
raAluno.value=""
cpfAluno.value=""
emailAluno.value=""
telefoneAluno.value=""

carregarAlunos()

}

async function carregarAlunos(){

const {data}=await supabaseClient
.from("alunos")
.select("*")
.order("nome")

alunosCache=data

let tabela="<tr><th>Nome</th><th>RA</th><th>Ação</th></tr>"
let select=""

data.forEach(a=>{

tabela+=`<tr>
<td>${a.nome}</td>
<td>${a.ra}</td>
<td><button onclick="editarAluno('${a.id}')">Editar</button></td>
</tr>`

select+=`<option value="${a.id}">${a.nome}</option>`

})

tabelaAlunos.innerHTML=tabela
movAluno.innerHTML=select
extratoAluno.innerHTML=select

}

function editarAluno(id){

const a=alunosCache.find(x=>x.id===id)

nomeAluno.value=a.nome
raAluno.value=a.ra
cpfAluno.value=a.cpf||""
emailAluno.value=a.email||""
telefoneAluno.value=a.telefone||""

alunoEditando=id

}

function filtrarAlunos(){

const termo=buscaAluno.value.toLowerCase()

let tabela="<tr><th>Nome</th><th>RA</th><th></th></tr>"

alunosCache.forEach(a=>{
if(a.nome.toLowerCase().includes(termo)){
tabela+=`<tr><td>${a.nome}</td><td>${a.ra}</td>
<td><button onclick="editarAluno('${a.id}')">Editar</button></td></tr>`
}
})

tabelaAlunos.innerHTML=tabela

}

function ajustarMetodo(){

if(tipoMov.value==="DEBITO"){
metodoMov.innerHTML=`<option value="5">Saldo</option>`
metodoMov.disabled=true
}else{
metodoMov.innerHTML=`
<option value="1">PIX</option>
<option value="2">Cartão Débito</option>
<option value="3">Cartão Crédito</option>
<option value="4">Dinheiro</option>`
metodoMov.disabled=false
}

}

async function mostrarSaldoAluno(){

const {data}=await supabaseClient
.from("saldo_alunos")
.select("*")
.eq("aluno_id",movAluno.value)
.single()

if(data) saldoAluno.innerHTML="Saldo: R$ "+parseFloat(data.saldo).toFixed(2)

}

async function movimentar(){

const user=(await supabaseClient.auth.getUser()).data.user

const registro={
aluno_id:movAluno.value,
tipo:tipoMov.value,
/*valor:parseFloat(valorMov.value),*/
valor:parseFloat(valorMov.value).toFixed(2),
descricao:descMov.value,
metodo_pagamento_id:tipoMov.value==="DEBITO"?5:parseInt(metodoMov.value),
usuario_id:user.id
}

const {error}=await supabaseClient
.from("transacoes")
.insert([registro])

if(error){alert(error.message);return}

valorMov.value=""
descMov.value=""

carregarSaldo()
mostrarSaldoAluno()
totalHoje()

}

function creditoRapido(v){
tipoMov.value="CREDITO"
valorMov.value=v
descMov.value="Crédito rápido"
movimentar()
}

function debitoRapido(v){
tipoMov.value="DEBITO"
valorMov.value=v
descMov.value="Consumo cantina"
movimentar()
}

async function carregarSaldo(){

const {data}=await supabaseClient.from("saldo_alunos").select("*")

let tabela="<tr><th>Aluno</th><th>Saldo</th></tr>"

data.forEach(a=>{
tabela+=`<tr><td>${a.nome}</td><td>R$ ${parseFloat(a.saldo).toFixed(2)}</td></tr>`
})

saldoTabela.innerHTML=tabela

}

async function totalHoje(){

const hoje=new Date().toISOString().slice(0,10)

const {data}=await supabaseClient
.from("transacoes")
.select("valor,tipo,created_at")

let total=0

data.forEach(t=>{
if(t.tipo==="CREDITO" && t.created_at.startsWith(hoje)){
total+=parseFloat(t.valor)
}
})

totalHoje.innerHTML="Total creditado hoje: R$ "+total.toFixed(2)

}

async function buscarExtrato(){

const aluno=extratoAluno.value

const {data}=await supabaseClient
.from("transacoes")
.select("*,alunos(nome)")
.eq("aluno_id",aluno)
.order("created_at",{ascending:false})

extratoCache=data

let tabela="<tr><th>Tipo</th><th>Valor</th><th>Descrição</th><th>Data</th><th>Ação</th></tr>"

data.forEach(t=>{

tabela+=`<tr>
<td>${t.tipo}</td>
<td>${parseFloat(t.valor).toFixed(2)}</td>
<td>${t.descricao}</td>
<td>${new Date(t.created_at).toLocaleString()}</td>
<td><button onclick="estornar('${t.id}','${t.tipo}',${t.valor})">Estornar</button></td>
</tr>`

})

tabelaExtrato.innerHTML=tabela

}

async function estornar(id,tipo,valor){

if(!confirm("Confirmar estorno?")) return

const novoTipo=tipo==="CREDITO"?"DEBITO":"CREDITO"

await supabaseClient.from("transacoes").insert([{
aluno_id:extratoAluno.value,
tipo:novoTipo,
valor:valor,
descricao:"ESTORNO "+id,
metodo_pagamento_id:5,
estorno_de:id
}])

buscarExtrato()
carregarSaldo()

}

function exportarExcel(){

let csv="Tipo,Valor,Descricao,Data\n"

extratoCache.forEach(t=>{
csv+=`${t.tipo},${t.valor},${t.descricao},${t.created_at}\n`
})

const blob=new Blob([csv])

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="extrato.csv"

a.click()

}

</script>

</body>
</html>
