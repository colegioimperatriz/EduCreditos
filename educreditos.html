<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>EduCreditos ERP v2.2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
font-family:'Inter',system-ui;
margin:0;
background:#f4f6fb;
color:#1f2937;
}

/* HEADER */

header{
height:60px;
background:white;
border-bottom:1px solid #e5e7eb;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 25px;
font-weight:600;
}

/* LOGIN */

.login{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.box{
background:white;
padding:35px;
border-radius:10px;
width:340px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* LAYOUT */

.container{
display:grid;
grid-template-columns:230px 1fr;
min-height:100vh;
}

.menu{
background:#0f172a;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.menu button{
width:100%;
padding:12px;
border:none;
background:transparent;
color:#cbd5e1;
border-radius:6px;
cursor:pointer;
text-align:left;
}

.menu button:hover{
background:#1e293b;
color:white;
}

/* MAIN */

.main{
padding:30px;
max-width:1400px;
width:100%;
margin:auto;
}

.card{
background:white;
padding:22px;
margin-bottom:25px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.05);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f9fafb;
padding:12px;
text-align:left;
font-size:14px;
}

td{
padding:12px;
border-top:1px solid #f1f5f9;
}

tr:hover{
background:#f9fafb;
}

/* INPUTS */

input,select{
padding:10px;
border:1px solid #e5e7eb;
border-radius:6px;
margin:5px;
}

input:focus,select:focus{
outline:none;
border-color:#2563eb;
}

/* BUTTON */

button{
background:#2563eb;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

/* QUICK */

.quick{
margin-top:10px;
}

.quick button{
background:#e5e7eb;
color:#111827;
margin:5px;
}

.quick button:hover{
background:#d1d5db;
}

.metrics{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:25px;
}

.metric{
background:white;
border:1px solid #e5e7eb;
padding:18px;
border-radius:8px;
}

.metric .label{
font-size:13px;
color:#6b7280;
}

.metric .value{
font-size:24px;
font-weight:600;
margin-top:4px;
}

</style>
</head>

<body>

<div id="loginScreen" class="login">
<div class="box">

<h2>Login</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginSenha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div id="loginErro" style="color:red"></div>

</div>
</div>

<div id="app" style="display:none">

<header>
EduCreditos ERP
<button onclick="logout()">Sair</button>
</header>

<div class="container">

<div class="menu">
<button onclick="abrir('dashboard')">Dashboard</button>
<button onclick="abrir('alunos')">Alunos</button>
<button onclick="abrir('mov')">Movimentações</button>
<button onclick="abrir('extrato')">Extrato</button>
</div>

<div class="main">

<div id="dashboard" class="card">

<h2>Dashboard</h2>

<div class="metrics">

<div class="metric">
<div class="label">Créditos hoje</div>
<div id="mCreditosHoje" class="value">0</div>
</div>

<div class="metric">
<div class="label">Débitos hoje</div>
<div id="mDebitosHoje" class="value">0</div>
</div>

<div class="metric">
<div class="label">Saldo total</div>
<div id="mSaldoTotal" class="value">0</div>
</div>

<div class="metric">
<div class="label">Alunos</div>
<div id="mAlunos" class="value">0</div>
</div>

</div>

<h3>Fluxo financeiro</h3>
<canvas id="graficoFluxo" height="90"></canvas>

<h3>Saldo por aluno</h3>
<table id="saldoTabela"></table>

</div>

<div id="alunos" class="card" style="display:none">

<h2>Cadastro de aluno</h2>

<input id="nomeAluno" placeholder="Nome">
<input id="raAluno" placeholder="RA">
<input id="cpfAluno" placeholder="CPF">
<input id="emailAluno" placeholder="Email">
<input id="telefoneAluno" placeholder="Telefone">

<button onclick="salvarAluno()">Salvar</button>

<input id="buscaAluno" placeholder="Buscar aluno" onkeyup="filtrarAlunos()">

<table id="tabelaAlunos"></table>

</div>

<div id="mov" class="card" style="display:none">

<h2>Movimentação</h2>

<select id="movAluno" onchange="mostrarSaldoAluno()"></select>

<div id="saldoAluno"></div>

<select id="tipoMov" onchange="ajustarMetodo()">
<option value="CREDITO">Crédito</option>
<option value="DEBITO">Débito</option>
</select>

<input id="valorMov" type="number" step="0.01" min="0" placeholder="Valor">

<select id="metodoMov">
<option value="1">PIX</option>
<option value="2">Cartão Débito</option>
<option value="3">Cartão Crédito</option>
<option value="4">Dinheiro</option>
</select>

<input id="descMov" placeholder="Descrição">

<button onclick="movimentar()">Registrar</button>

<div class="quick">

<button onclick="creditoRapido(10)">+10</button>
<button onclick="creditoRapido(20)">+20</button>

<button onclick="debitoRapido(10)">-10</button>
<button onclick="debitoRapido(20)">-20</button>

</div>

</div>

<div id="extrato" class="card" style="display:none">

<h2>Extrato</h2>

<select id="extratoAluno"></select>

<button onclick="buscarExtrato()">Buscar</button>
<button onclick="exportarExcel()">Exportar</button>

<table id="tabelaExtrato"></table>

</div>

</div>
</div>
</div>

<script>

const SUPABASE_URL="https://qsknpfbkbnlebnirdntu.supabase.co"
const SUPABASE_KEY="sb_publishable_t8hbJ0xAlFokJPIIO6RW_Q__HFj8sA_"

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let alunosCache=[]
let extratoCache=[]
let alunoEditando=null
let grafico=null

async function login(){

const {error}=await supabaseClient.auth.signInWithPassword({
email:loginEmail.value,
password:loginSenha.value
})

if(error){
loginErro.innerText=error.message
return
}

iniciarSistema()

}

async function logout(){
await supabaseClient.auth.signOut()
location.reload()
}

async function iniciarSistema(){

loginScreen.style.display="none"
app.style.display="block"

await carregarAlunos()
await carregarSaldo()
await totalHoje()

await atualizarMetricas()
await atualizarSaldoTotal()
atualizarTotalAlunos()
await atualizarGrafico()

}

supabaseClient.auth.getSession().then(({data})=>{
if(data?.session) iniciarSistema()
})

function abrir(id){

document.querySelectorAll(".card").forEach(c=>c.style.display="none")
document.getElementById(id).style.display="block"

}

async function salvarAluno(){

const aluno={
nome:nomeAluno.value || "",
ra:raAluno.value || "",
cpf:cpfAluno.value || "",
email:emailAluno.value || "",
telefone:telefoneAluno.value || ""
}

if(alunoEditando){

await supabaseClient.from("alunos").update(aluno).eq("id",alunoEditando)
alunoEditando=null

}else{

await supabaseClient.from("alunos").insert([aluno])

}

nomeAluno.value=""
raAluno.value=""
cpfAluno.value=""
emailAluno.value=""
telefoneAluno.value=""

carregarAlunos()

}

async function carregarAlunos(){

const {data,error}=await supabaseClient.from("alunos").select("*").order("nome")

if(error){
console.error(error)
return
}

alunosCache=data || []

let tabela="<tr><th>Nome</th><th>RA</th><th>Ação</th></tr>"
let select=""

alunosCache.forEach(a=>{

tabela+=`<tr>
<td>${a.nome}</td>
<td>${a.ra}</td>
<td><button onclick="editarAluno('${a.id}')">Editar</button></td>
</tr>`

select+=`<option value="${a.id}">${a.nome}</option>`

})

tabelaAlunos.innerHTML=tabela
movAluno.innerHTML=select
extratoAluno.innerHTML=select

}

function editarAluno(id){

const a=alunosCache.find(x=>x.id===id)
if(!a) return

nomeAluno.value=a.nome
raAluno.value=a.ra
cpfAluno.value=a.cpf||""
emailAluno.value=a.email||""
telefoneAluno.value=a.telefone||""

alunoEditando=id

}

function filtrarAlunos(){

const termo=buscaAluno.value.toLowerCase()

let tabela="<tr><th>Nome</th><th>RA</th><th></th></tr>"

alunosCache.forEach(a=>{
if(a.nome?.toLowerCase().includes(termo)){
tabela+=`<tr><td>${a.nome}</td><td>${a.ra}</td>
<td><button onclick="editarAluno('${a.id}')">Editar</button></td></tr>`
}
})

tabelaAlunos.innerHTML=tabela

}

function ajustarMetodo(){

if(tipoMov.value==="DEBITO"){
metodoMov.innerHTML=`<option value="5">Saldo</option>`
metodoMov.disabled=true
}else{
metodoMov.innerHTML=`
<option value="1">PIX</option>
<option value="2">Cartão Débito</option>
<option value="3">Cartão Crédito</option>
<option value="4">Dinheiro</option>`
metodoMov.disabled=false
}

}

async function mostrarSaldoAluno(){

const {data}=await supabaseClient
.from("saldo_alunos")
.select("*")
.eq("aluno_id",movAluno.value)
.single()

if(data){
saldoAluno.innerHTML="Saldo: R$ "+parseFloat(data.saldo||0).toFixed(2)
}else{
saldoAluno.innerHTML="Saldo: R$ 0.00"
}

}

async function movimentar(){

const user=(await supabaseClient.auth.getUser()).data.user
if(!user) return

const registro={
aluno_id:movAluno.value,
tipo:tipoMov.value,
valor:parseFloat(valorMov.value||0),
descricao:descMov.value || "",
metodo_pagamento_id:tipoMov.value==="DEBITO"?5:parseInt(metodoMov.value),
usuario_id:user.id
}

const {error}=await supabaseClient.from("transacoes").insert([registro])

if(error){
alert(error.message)
return
}

valorMov.value=""
descMov.value=""

carregarSaldo()
mostrarSaldoAluno()
totalHoje()

atualizarMetricas()
atualizarSaldoTotal()
atualizarGrafico()

}

function creditoRapido(v){
tipoMov.value="CREDITO"
valorMov.value=v
descMov.value="Crédito rápido"
movimentar()
}

function debitoRapido(v){
tipoMov.value="DEBITO"
valorMov.value=v
descMov.value="Consumo cantina"
movimentar()
}

async function carregarSaldo(){

const {data}=await supabaseClient.from("saldo_alunos").select("*")

if(!data){
saldoTabela.innerHTML=""
return
}

let tabela="<tr><th>Aluno</th><th>Saldo</th></tr>"

data.forEach(a=>{
tabela+=`<tr><td>${a.nome}</td><td>R$ ${parseFloat(a.saldo||0).toFixed(2)}</td></tr>`
})

saldoTabela.innerHTML=tabela

}

async function totalHoje(){

const hoje=new Date().toISOString().slice(0,10)

const {data}=await supabaseClient.from("transacoes").select("valor,tipo,created_at")

let total=0

;(data||[]).forEach(t=>{
if(t.tipo==="CREDITO" && t.created_at?.startsWith(hoje)){
total+=parseFloat(t.valor||0)
}
})

}

async function buscarExtrato(){

const aluno=extratoAluno.value

const {data}=await supabaseClient
.from("transacoes")
.select("*,alunos(nome)")
.eq("aluno_id",aluno)
.order("created_at",{ascending:false})

extratoCache=data||[]

let tabela="<tr><th>Tipo</th><th>Valor</th><th>Descrição</th><th>Data</th><th>Ação</th></tr>"

extratoCache.forEach(t=>{

tabela+=`<tr>
<td>${t.tipo}</td>
<td>${parseFloat(t.valor||0).toFixed(2)}</td>
<td>${t.descricao||""}</td>
<td>${new Date(t.created_at).toLocaleString()}</td>
<td><button onclick="estornar('${t.id}','${t.tipo}',${t.valor})">Estornar</button></td>
</tr>`

})

tabelaExtrato.innerHTML=tabela

}

async function estornar(id,tipo,valor){

if(!confirm("Confirmar estorno?")) return

const novoTipo=tipo==="CREDITO"?"DEBITO":"CREDITO"

await supabaseClient.from("transacoes").insert([{
aluno_id:extratoAluno.value,
tipo:novoTipo,
valor:valor,
descricao:"ESTORNO "+id,
metodo_pagamento_id:5,
estorno_de:id
}])

buscarExtrato()
carregarSaldo()

}

function exportarExcel(){

let csv="Tipo,Valor,Descricao,Data\n"

extratoCache.forEach(t=>{
csv+=`${t.tipo},${t.valor},${t.descricao},${t.created_at}\n`
})

const blob=new Blob([csv])
const a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="extrato.csv"

a.click()

}

async function atualizarMetricas(){

const hoje=new Date().toISOString().slice(0,10)

const {data}=await supabaseClient
.from("transacoes")
.select("valor,tipo,created_at")

let creditos=0
let debitos=0

;(data||[]).forEach(t=>{
if(t.created_at?.startsWith(hoje)){
if(t.tipo==="CREDITO") creditos+=parseFloat(t.valor||0)
if(t.tipo==="DEBITO") debitos+=parseFloat(t.valor||0)
}
})

mCreditosHoje.innerText="R$ "+creditos.toFixed(2)
mDebitosHoje.innerText="R$ "+debitos.toFixed(2)

}

async function atualizarSaldoTotal(){

const {data}=await supabaseClient
.from("saldo_alunos")
.select("saldo")

let total=0

;(data||[]).forEach(s=>{
total+=parseFloat(s.saldo||0)
})

mSaldoTotal.innerText="R$ "+total.toFixed(2)

}

function atualizarTotalAlunos(){
mAlunos.innerText=alunosCache.length
}

async function atualizarGrafico(){

const {data}=await supabaseClient
.from("transacoes")
.select("valor,tipo,created_at")
.order("created_at")

if(!data || data.length===0) return

let mapa={}

data.forEach(t=>{

let dia=t.created_at.slice(0,10)

if(!mapa[dia]) mapa[dia]={credito:0,debito:0}

if(t.tipo==="CREDITO")
mapa[dia].credito+=parseFloat(t.valor||0)

if(t.tipo==="DEBITO")
mapa[dia].debito+=parseFloat(t.valor||0)

})

let labels=Object.keys(mapa)
let creditos=labels.map(d=>mapa[d].credito)
let debitos=labels.map(d=>mapa[d].debito)

if(grafico) grafico.destroy()

grafico=new Chart(graficoFluxo,{
type:"line",
data:{
labels:labels,
datasets:[
{label:"Créditos",data:creditos},
{label:"Débitos",data:debitos}
]
}
})

}

</script>

</body>
</html>
